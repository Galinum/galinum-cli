name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.15.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Run tests
        run: pnpm test
      - name: Build
        run: pnpm build
      - name: Smoke check CLI loads
        run: node dist/bin.js help
      - name: Build bundled CLI
        run: pnpm build:bundle
      - name: Smoke check bundled CLI loads
        run: node dist/cli.cjs help
